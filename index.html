<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A beginner-friendly contact form with client-side validation using HTML, CSS, and JavaScript."
    />
    <title>Contact Us | Contact Form</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="contact-card" aria-labelledby="contactHeading">
        <h1 id="contactHeading">Contact Us</h1>
        <p class="contact-intro">
          Fill in the form below to get in touch. Your input is validated as you
          go and never leaves your browser.
        </p>
        <p class="required-note">Fields marked with (*) are required.</p>

        <form id="contactForm" class="contact-form" novalidate>
          <div class="form-group">
            <label for="fullName" class="form-label">
              Full Name
              <span class="required-indicator" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              class="form-input"
              placeholder="Taylor Smith"
              autocomplete="name"
              aria-describedby="fullNameError"
              aria-invalid="false"
              required
            />
            <span
              id="fullNameError"
              class="error-message"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">
              Email
              <span class="required-indicator" aria-hidden="true">*</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="taylor@example.com"
              autocomplete="email"
              aria-describedby="emailError"
              aria-invalid="false"
              required
            />
            <span
              id="emailError"
              class="error-message"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label for="nationalNumber" class="form-label">
              Phone
              <span class="required-indicator" aria-hidden="true">*</span>
            </label>
            <div class="phone-input-group">
              <button
                type="button"
                id="countryTrigger"
                class="country-trigger"
                aria-label="Country code"
              ></button>
              <input
                type="tel"
                id="nationalNumber"
                class="form-input phone-national-input"
                placeholder="541234567"
                autocomplete="tel-national"
                aria-describedby="phoneError"
                aria-invalid="false"
                required
              />
              <input type="hidden" id="phone" name="phone" />
              <div
                id="countryPopover"
                class="country-popover"
                hidden
              >
                <input
                  type="search"
                  id="countrySearch"
                  class="country-search"
                  placeholder="Search country or code"
                  aria-label="Search country or code"
                  autocomplete="off"
                />
                <ul id="countryList" class="country-list" role="listbox"></ul>
              </div>
            </div>
            <span
              id="phoneError"
              class="error-message"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label for="message" class="form-label">
              Message
              <span class="required-indicator" aria-hidden="true">*</span>
            </label>
            <textarea
              id="message"
              name="message"
              class="form-input form-textarea"
              rows="5"
              placeholder="I would like more information."
              aria-describedby="messageError"
              aria-invalid="false"
              required
            ></textarea>
            <span
              id="messageError"
              class="error-message"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <button type="submit" class="submit-button">Submit</button>
        </form>

        <div
          id="submissionPopup"
          class="submission-popup"
          role="dialog"
          aria-modal="true"
          aria-labelledby="submissionPopupTitle"
          hidden
        >
          <div class="submission-popup__card">
            <button
              type="button"
              id="submissionPopupClose"
              class="submission-popup__close"
              aria-label="Close submitted details"
            >
              X
            </button>

            <div class="submission-popup__icon" aria-hidden="true">&#10003;</div>
            <h2 id="submissionPopupTitle">Message Sent</h2>
            <p class="submission-popup__intro">
              Thanks! Your message has been received.
            </p>

            <dl class="submission-popup__details">
              <div class="submission-popup__row">
                <dt>Name</dt>
                <dd id="submittedFullName"></dd>
              </div>
              <div class="submission-popup__row">
                <dt>Email</dt>
                <dd id="submittedEmail"></dd>
              </div>
              <div class="submission-popup__row">
                <dt>Phone</dt>
                <dd id="submittedPhone"></dd>
              </div>
              <div class="submission-popup__row">
                <dt>Message</dt>
                <dd id="submittedMessage"></dd>
              </div>
            </dl>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="javascript/main.js"></script>
  </body>
</html>
